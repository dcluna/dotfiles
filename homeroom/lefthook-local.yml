colors: false
no_tty: true

pre-commit:
  parallel: true
  commands:
    bundle_audit:
      tags:
        - security
        - dependencies
      run: bundle audit
      skip:
        - merge
        - rebase
      only: &only_master
        - ref: master

    flay:
      tags:
        - code-quality
        - duplication
      glob: "*.rb"
      exclude: "Gemfile|db/schema.rb|db/data_schema.rb"
      skip:
        - merge
        - rebase
      run: flay {staged_files}

    trailing_whitespace:
      tags:
        - formatting
        - style
      glob: "*"
      exclude: "db/structure.sql|spec/vcr_cassettes/**/*"
      skip:
        - merge
        - rebase
      run: git diff --check {staged_files}

    yaml_lint:
      tags:
        - linting
        - style
      glob: "*.{yml,yaml}"
      exclude: "spec/cassettes/**"
      skip:
        - merge
        - rebase
      run: yamllint {staged_files}
      on_fail: warn

    ruby_syntax:
      tags:
        - qa
        - linting
        - syntax
      glob: "*.rb"
      skip:
        - merge
        - rebase
      run: ruby -c {staged_files}

    no_specs_in_app:
      tags:
        - qa
        - rails
      skip:
        - merge
        - rebase
      run: check-no-specs-in-app

    flipper_outside_model:
      tags:
        - qa
        - flipper
      skip:
        - merge
        - rebase
      glob: "*.rb"
      run: ast-grep scan --rule "$DOTFILES_DIR/ast-grep/rules/flipper-outside-model.yml" --globs {staged_files}

    no_dump_db_metadata:
      tags:
        - qa
        - rspec
      skip:
        - merge
        - rebase
      run: ast-grep scan --rule "$DOTFILES_DIR/ast-grep/rules/no-dump-db-metadata.yml" --globs {staged_files}

    rails_logger_block_form:
      tags:
        - qa
        - rails
      skip:
        - merge
        - rebase
      glob: "*.rb"
      run: ast-grep scan --rule "$DOTFILES_DIR/ast-grep/rules/rails-logger-block-form.yml" --globs {staged_files}

    rubocop_user_preferences:
      tags:
        - qa
        - code-quality
      skip:
        - merge
        - rebase
      glob: "*.rb"
      run: rubocop --require "$DOTFILES_DIR/rubocop/cops/no_complex_initialize_assignment.rb" --require "$DOTFILES_DIR/rubocop/cops/no_ivar_outside_entry_method.rb" --require "$DOTFILES_DIR/rubocop/cops/rescue_requires_reraise.rb" --require "$DOTFILES_DIR/rubocop/cops/no_instance_variable_get_set.rb" --require "$DOTFILES_DIR/rubocop/cops/prefer_travel_to_block.rb" --require "$DOTFILES_DIR/rubocop/cops/prefer_with_versioning.rb" --config ~/.config/rubocop/config.yml {staged_files}

    rubocop-debugger:
      tags:
        - qa
      skip:
        - merge
        - rebase
      glob: "*.rb"
      run: |
        rubocop --fail-level warning --raise-cop-error -c .rubocop.yml --only Lint/Debugger {staged_files}

    rubocop-logger-block:
      tags:
        - qa
        - rails
      skip:
        - merge
        - rebase
      glob: "*.rb"
      run: |
        rubocop --raise-cop-error --only Rails/EagerEvaluationLogMessage {staged_files}

    rubocop-documentation:
      tags:
        - qa
        - documentation
      skip:
        - merge
        - rebase
      glob: "*.rb"
      exclude: "spec/**/*.rb|db/**/*.rb|config/initializers/**/*.rb"
      run: |
        rubocop --raise-cop-error --only Style/Documentation --force-default-config {staged_files}

