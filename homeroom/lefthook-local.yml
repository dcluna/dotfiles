pre-push:
  parallel: true

  commands:
    protected_branches:
      tags:
        - safety
        - git
      run: |
        BRANCH=$(git symbolic-ref HEAD | sed -e 's,.*/\(.*\),\1,')
        PROTECTED_BRANCHES="main master develop production"
        if [[ $PROTECTED_BRANCHES =~ $BRANCH ]]; then
          echo "Pushing to protected branch '$BRANCH' is not allowed"
          exit 1
        fi

    check_structure_sql:
      skip: true
      tags:
        - database
        - schema
      run: ./bin/check-timestamps.sh

  jobs:
    - name: plan_doc_check
      group:
        piped: true
        jobs:
          - name: plan_file_exists
            tags: [documentation, safety]
            skip: &skip_protected
              - ref: master
              - ref: main
              - ref: develop
              - ref: production
            run: check-plan-exists
          - name: plan_file_current
            tags: [documentation, ai]
            skip: *skip_protected
            run: check-plan-coverage
          - name: no_plan_file_exists
            tags: [documentation, safety]
            skip: *skip_protected
            run: check-no-plan-exists

post-checkout:
  quiet: true
  parallel: true

  commands:
    index_tags:
      tags:
        - tooling
        - development
      only:
        - *only_master
      run: ctags -R --exclude=.git --exclude=node_modules --exclude=vendor

    lefthook-local-setup:
      skip: true
      # Run only if the checkout is a worktree checkout
      run: |
        if [ "{1}" -eq 0 ] && [ "{3}" -eq 1 ]; then
          ln -s $LEFTHOOK_LOCAL_LOCATION
        else
          echo "Not copying lefthook files because ref '{1}' is not a worktree checkout"
        fi

    copy-env-files:
      # Run only if the checkout is a worktree update
      tags:
        - worktree
      run: |
        # Detect if this is a worktree checkout
        if [ "{1}" -eq 0 ] && [ "{3}" -eq 1 ]; then
          # Copy all .env files from parent directory
          touch .projectile
          cp $MAIN_GIT_DIR/.mcp* .
          cp $MAIN_GIT_DIR/.env* .
          direnv allow
          cp $MAIN_GIT_DIR/config/application.yml ./config/application.yml
          ln -s $MAIN_GIT_DIR/.dir-locals.el .dir-locals.el
          direnv allow
          # Also allow direnv in the corresponding vagrant folder
          VAGRANT_DIR=$(cd "$MAIN_GIT_DIR" && while [ "$PWD" != "/" ]; do
            if [ -f Vagrantfile ]; then echo "$PWD"; break; fi
            cd ..
          done)
          if [ -n "$VAGRANT_DIR" ]; then
            (cd "$VAGRANT_DIR" && direnv allow)
          fi
          # Rewrite API_DIR in .envrc to match this worktree's dirname
          WORKTREE_BASENAME=$(basename "$PWD")
          sed -i '' "s|export API_DIR=\"/vagrant/api\"|export API_DIR=\"/vagrant/${WORKTREE_BASENAME}\"|" .envrc
        fi
