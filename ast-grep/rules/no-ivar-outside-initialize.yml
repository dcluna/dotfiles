id: no-ivar-outside-initialize
language: ruby
files:
  - app/**/*.rb
ignores:
  - app/workers/**/*.rb
  - app/jobs/**/*.rb
rule:
  kind: instance_variable
  not:
    inside:
      kind: method
      has:
        field: name
        regex: "^initialize$"
        stopBy: end
      stopBy: end
message: "Use reader/accessor methods instead of instance variables outside initialize. Exception: memoization patterns like `def foo; @foo ||= ...; end` where the ivar matches the method name are acceptable and do not need correction."
severity: error
