id: no-ivar-outside-perform
language: ruby
files:
  - app/workers/**/*.rb
  - app/jobs/**/*.rb
rule:
  kind: instance_variable
  not:
    inside:
      kind: method
      has:
        field: name
        regex: "^(initialize|perform)$"
        stopBy: end
      stopBy: end
message: "Use reader/accessor methods instead of instance variables outside initialize/perform"
severity: error
